AWSTemplateFormatVersion: "2010-09-09"

Description: Cloud Formation template to create S3 Bucket for Terraform state

Metadata:
  AWSToolsMetrics:
    Rain: '{"Version":"v1.24.3","Experimental":false,"HasModules":false,"HasRainSection":false}'

Parameters:
  StateBucketName:
    Description: Name of S3 bucket for terraform state.
    Type: String

  StateLockTableName:
    Description: Name of Dynamo DB Table for terraform state locking.
    Type: String

  ReplicaBucketArn:
    Description: ARN of the replica S3 bucket in the secondary region (eu-west-1).
    Type: String

Resources:
  StateReplicationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: terraform-state-replication-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: TerraformStateReplicationPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetReplicationConfiguration
                  - s3:ListBucket
                Resource: !Sub arn:aws:s3:::${StateBucketName}
              - Effect: Allow
                Action:
                  - s3:GetObjectVersionForReplication
                  - s3:GetObjectVersionAcl
                  - s3:GetObjectVersionTagging
                Resource: !Sub arn:aws:s3:::${StateBucketName}/*
              - Effect: Allow
                Action:
                  - s3:ReplicateObject
                  - s3:ReplicateDelete
                  - s3:ReplicateTags
                Resource: !Sub ${ReplicaBucketArn}/*

  # S3 Bucket for Terraform State
  StateBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref StateBucketName
      VersioningConfiguration:
        Status: Enabled
      ReplicationConfiguration:
        Role: !GetAtt StateReplicationRole.Arn
        Rules:
          - Id: ReplicateAll
            Status: Enabled
            Destination:
              Bucket: !Ref ReplicaBucketArn
      LifecycleConfiguration:
        Rules:
          - Status: Enabled
            ExpirationInDays: 365
            Prefix: terraform-state/

  StateLockTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref StateLockTableName
      AttributeDefinitions:
        - AttributeName: LockID
          AttributeType: S
      KeySchema:
        - AttributeName: LockID
          KeyType: HASH
      ProvisionedThroughput:
        ReadCapacityUnits: 5
        WriteCapacityUnits: 5
      TimeToLiveSpecification:
        AttributeName: TTL
        Enabled: true
      BillingMode: PROVISIONED

Outputs:
  S3BucketName:
    Description: The name of the S3 bucket for Terraform state
    Value: !Ref StateBucket

  DynamoDBTableName:
    Description: The name of the DynamoDB table for Terraform state locking
    Value: !Ref StateLockTable

